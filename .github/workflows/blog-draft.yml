name: Weekly Blog Draft Generator

on:
  schedule:
    # Every Monday 9:00 AM KST (= Monday 00:00 UTC)
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      topic:
        description: '블로그 주제 힌트 (선택)'
        required: false
        default: ''
      lang:
        description: '언어 선택'
        required: false
        default: 'ko'
        type: choice
        options:
          - ko
          - en

jobs:
  generate-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate blog draft via Claude API
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOPIC_HINT: ${{ github.event.inputs.topic || '' }}
          LANG: ${{ github.event.inputs.lang || 'ko' }}
        run: |
          node .github/scripts/generate-blog-draft.mjs

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'draft: auto-generated blog post'
          branch: blog-draft/${{ github.run_number }}
          title: '📝 [초안] 블로그 포스트 자동 생성 #${{ github.run_number }}'
          body: |
            ## 자동 생성 블로그 초안

            Claude API가 생성한 초안입니다. 검토 후 수정하여 merge해주세요.

            ### 체크리스트
            - [ ] 내용 검토 및 수정
            - [ ] 제목·설명 최적화
            - [ ] FAQ 추가 또는 수정
            - [ ] 태그 확인
            - [ ] 최종 승인 후 merge

            > 이 PR은 GitHub Actions에 의해 자동 생성되었습니다.
          labels: 'blog-draft,auto-generated'
          draft: true
