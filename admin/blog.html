<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Admin | FAIRPASS</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.css" />
  <!-- EasyMDE Markdown Editor -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.js"></script>
  <!-- Marked.js for preview rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #060610; --sidebar-bg: #0a0a1c; --surface: rgba(255,255,255,0.05);
      --surface2: rgba(255,255,255,0.08); --border: rgba(255,255,255,0.10);
      --text: #fff; --muted: rgba(255,255,255,0.50); --muted2: rgba(255,255,255,0.30);
      --purple: #8b5cf6; --purple-light: #a855f7; --purple-bg: rgba(139,92,246,0.15);
      --cyan: #06b6d4; --cyan-light: #22d3ee; --green: #10b981; --red: #ef4444;
      --radius: 12px; --radius-sm: 8px; --radius-xs: 6px; --sidebar-w: 182px;
    }
    body { font-family: 'Pretendard', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    input, select, textarea, button { font-family: inherit; }
    button { cursor: pointer; }

    /* ── Login ── */
    #loginScreen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 30% 50%, rgba(139,92,246,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 50%, rgba(6,182,212,0.10) 0%, transparent 60%);
    }
    .login-card { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: var(--radius); padding: 48px 40px; width: 360px; text-align: center; }
    .login-logo { font-size: 22px; font-weight: 800; letter-spacing: 1px; margin-bottom: 6px; }
    .login-logo span { background: linear-gradient(135deg, var(--purple-light), var(--cyan-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; }
    .login-input { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: var(--radius-xs); color: var(--text); font-size: 15px; margin-bottom: 14px; outline: none; transition: border-color 0.2s; }
    .login-input:focus { border-color: var(--purple-light); }
    .login-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--purple), var(--cyan)); border: none; border-radius: var(--radius-xs); color: #fff; font-size: 15px; font-weight: 700; transition: opacity 0.2s; }
    .login-btn:hover { opacity: 0.88; }
    .login-err { font-size: 13px; color: var(--red); margin-top: 10px; min-height: 20px; }

    /* ── Layout ── */
    #app { display: none; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: var(--sidebar-w); background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; bottom: 0; left: 0; z-index: 50; }
    .sidebar-logo { padding: 22px 20px 18px; font-size: 18px; font-weight: 800; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
    .sidebar-logo span { background: linear-gradient(135deg, var(--purple-light), var(--cyan-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .sidebar-nav { flex: 1; padding: 10px 0; overflow-y: auto; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 20px; font-size: 14px; font-weight: 500; color: var(--muted); border: none; background: none; width: 100%; text-align: left; transition: all 0.15s; }
    .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .nav-item.active { color: var(--purple-light); background: var(--purple-bg); font-weight: 700; }
    .nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
    .sidebar-bottom { padding: 16px; border-top: 1px solid var(--border); }
    .logout-btn { width: 100%; padding: 9px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: var(--radius-xs); color: var(--muted); font-size: 13px; font-weight: 600; transition: all 0.2s; }
    .logout-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .main { margin-left: var(--sidebar-w); flex: 1; padding: 32px; min-height: 100vh; }

    /* ── Page header ── */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .page-title { font-size: 22px; font-weight: 800; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 4px; width: fit-content; margin-bottom: 20px; }
    .tab { padding: 7px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; background: none; color: var(--muted); transition: all 0.15s; }
    .tab.active { background: var(--purple); color: #fff; }
    .tab:hover:not(.active) { color: var(--text); }

    /* ── Post list ── */
    .post-list { display: flex; flex-direction: column; gap: 8px; }
    .post-item { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); transition: all 0.15s; }
    .post-item:hover { border-color: rgba(139,92,246,0.4); background: var(--surface2); }
    .post-item-left { flex: 1; min-width: 0; }
    .post-item-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .post-item-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .post-item-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
    .badge-draft   { background: rgba(239,68,68,0.2);   color: #f87171; }
    .badge-writing { background: rgba(251,191,36,0.2);  color: #fbbf24; }
    .badge-pub     { background: rgba(16,185,129,0.2);  color: #34d399; }

    /* ── Buttons ── */
    .btn { padding: 8px 16px; border-radius: var(--radius-xs); font-size: 13px; font-weight: 600; border: none; transition: all 0.15s; }
    .btn-primary { background: linear-gradient(135deg, var(--purple), var(--cyan)); color: #fff; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-ghost { background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
    .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .btn-danger { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn-icon { padding: 6px 10px; }

    /* ── Editor panel ── */
    #editorPanel { display: none; }
    #editorPanel.open { display: block; }
    .editor-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .editor-header h2 { font-size: 17px; font-weight: 700; flex: 1; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .form-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.span2 { grid-column: span 2; }
    .form-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .form-input, .form-select { padding: 9px 12px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: var(--radius-xs); color: var(--text); font-size: 13px; outline: none; transition: border-color 0.2s; width: 100%; }
    .form-input:focus, .form-select:focus { border-color: var(--purple-light); }
    .form-select option { background: #1a1a2e; }
    .toggle-row { display: flex; align-items: center; gap: 8px; }
    .toggle { position: relative; width: 36px; height: 20px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: rgba(255,255,255,0.15); border-radius: 10px; transition: 0.2s; cursor: pointer; }
    .toggle-slider::before { content: ''; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: 0.2s; }
    .toggle input:checked + .toggle-slider { background: var(--green); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }

    /* ── Markdown editor overrides ── */
    .editor-wrapper { border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 16px; }
    .EasyMDEContainer { background: transparent; }
    .EasyMDEContainer .CodeMirror { background: rgba(255,255,255,0.03); color: var(--text); border: none; font-size: 14px; min-height: 380px; padding: 12px; }
    .EasyMDEContainer .CodeMirror-cursor { border-left-color: var(--purple-light); }
    .EasyMDEContainer .editor-toolbar { background: rgba(255,255,255,0.04); border: none; border-bottom: 1px solid var(--border); }
    .EasyMDEContainer .editor-toolbar button { color: var(--muted) !important; border: none !important; }
    .EasyMDEContainer .editor-toolbar button:hover, .EasyMDEContainer .editor-toolbar button.active { background: rgba(139,92,246,0.2) !important; color: var(--purple-light) !important; border-radius: 4px !important; }
    .EasyMDEContainer .editor-toolbar i.separator { border-color: var(--border); }
    .EasyMDEContainer .editor-preview { background: rgba(10,10,18,0.9); color: var(--text); }
    .EasyMDEContainer .editor-statusbar { display: none; }

    /* ── Image upload zone ── */
    .img-upload-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .img-upload-label { display: flex; align-items: center; gap: 6px; padding: 7px 14px; background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius-xs); font-size: 12px; color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .img-upload-label:hover { border-color: var(--purple); color: var(--purple-light); }
    #imgFileInput { display: none; }
    #imgUploadStatus { font-size: 12px; color: var(--muted); }

    /* ── Save bar ── */
    .save-bar { position: sticky; bottom: 0; background: var(--bg); border-top: 1px solid var(--border); padding: 14px 0; margin-top: 8px; display: flex; align-items: center; justify-content: space-between; gap: 12px; z-index: 10; }
    .save-status { font-size: 13px; color: var(--muted); }
    .save-status.ok { color: var(--green); }
    .save-status.err { color: var(--red); }

    /* ── Misc ── */
    .loading { text-align: center; padding: 48px; color: var(--muted); font-size: 14px; }
    .empty { text-align: center; padding: 48px; color: var(--muted2); font-size: 14px; }
    .divider { height: 1px; background: var(--border); margin: 20px 0; }
    .slug-hint { font-size: 11px; color: var(--muted2); margin-top: 4px; }

    /* ── Preview Modal ── */
    #previewModal { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
    #previewModal.open { display: flex; align-items: flex-start; justify-content: center; padding: 32px 16px; overflow-y: auto; }
    .preview-box { background: #0e0e1a; border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 760px; overflow: hidden; }
    .preview-box-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .preview-box-header span { font-size: 14px; font-weight: 700; }
    .preview-content { padding: 32px 36px; color: rgba(255,255,255,0.82); font-size: 15px; line-height: 1.8; }
    .preview-content h1 { font-size: 1.6rem; font-weight: 800; color: #fff; margin-bottom: 8px; }
    .preview-content h2 { font-size: 1.2rem; font-weight: 700; color: #fff; margin: 2rem 0 0.8rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .preview-content h3 { font-size: 1.05rem; font-weight: 600; color: #fff; margin: 1.5rem 0 0.6rem; }
    .preview-content p { margin-bottom: 1.1rem; }
    .preview-content ul, .preview-content ol { padding-left: 1.5rem; margin-bottom: 1.1rem; }
    .preview-content ul { list-style: disc; }
    .preview-content ol { list-style: decimal; }
    .preview-content li { margin-bottom: 0.3rem; }
    .preview-content strong { color: #fff; font-weight: 600; }
    .preview-content a { color: var(--purple-light); text-decoration: underline; }
    .preview-content blockquote { border-left: 3px solid var(--purple); padding-left: 1rem; color: var(--muted); font-style: italic; margin: 1.2rem 0; }
    .preview-content code { background: rgba(255,255,255,0.08); border-radius: 4px; padding: 0.1em 0.4em; font-size: 0.875em; }
    .preview-content table { width: 100%; border-collapse: collapse; margin-bottom: 1.2rem; font-size: 0.875rem; }
    .preview-content th { padding: 0.6rem 0.75rem; background: rgba(255,255,255,0.06); border-bottom: 1px solid var(--border); color: #fff; font-weight: 600; text-align: left; }
    .preview-content td { padding: 0.6rem 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .preview-content img { max-width: 100%; border-radius: var(--radius-sm); margin: 0.5rem 0; }
    .preview-content hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

    /* ── Autosave indicator ── */
    .autosave-bar { display: flex; align-items: center; gap: 8px; padding: 6px 0 10px; font-size: 12px; color: var(--muted2); }
    .autosave-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted2); flex-shrink: 0; }
    .autosave-dot.saved { background: var(--green); }
    .autosave-dot.saving { background: var(--cyan); animation: pulse 0.8s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">FAIR<span>PASS</span></div>
    <div class="login-sub">Blog Admin</div>
    <input id="pwInput" class="login-input" type="password" placeholder="관리자 비밀번호" />
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <div class="layout">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-logo">FAIR<span>PASS</span></div>
      <nav class="sidebar-nav">
        <a class="nav-item" href="/admin/">
          <span class="nav-icon">📊</span> 대시보드
        </a>
        <button class="nav-item active" onclick="showList()">
          <span class="nav-icon">✍️</span> 블로그
        </button>
      </nav>
      <div class="sidebar-bottom">
        <button class="logout-btn" onclick="doLogout()">로그아웃</button>
      </div>
    </div>

    <!-- Main -->
    <main class="main">

      <!-- LIST VIEW -->
      <div id="listView">
        <div class="page-header">
          <h1 class="page-title">블로그 관리</h1>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-ghost btn-sm" onclick="loadList()">↺ 새로고침</button>
            <button class="btn btn-primary" onclick="openNew()">+ 새 포스트</button>
          </div>
        </div>

        <div class="tabs">
          <button class="tab active" id="tabKo" onclick="switchLang('ko')">🇰🇷 한국어</button>
          <button class="tab" id="tabEn" onclick="switchLang('en')">🇺🇸 English</button>
        </div>

        <div id="postListContainer" class="post-list">
          <div class="loading">불러오는 중...</div>
        </div>
      </div>

      <!-- EDITOR VIEW -->
      <div id="editorPanel">
        <div class="editor-header">
          <button class="btn btn-ghost btn-sm" onclick="showList()">← 목록으로</button>
          <h2 id="editorTitle">새 포스트</h2>
          <span id="editorLangBadge" style="font-size:12px;color:var(--muted);"></span>
        </div>

        <!-- Frontmatter fields -->
        <div class="form-grid">
          <div class="form-group span2">
            <label class="form-label">제목 (title)</label>
            <input class="form-input" id="fTitle" type="text" placeholder="포스트 제목" />
          </div>
          <div class="form-group span2">
            <label class="form-label">설명 (description) — SEO용 160자 이내</label>
            <input class="form-input" id="fDesc" type="text" placeholder="검색 결과에 표시될 설명" maxlength="160" />
          </div>
          <div class="form-group">
            <label class="form-label">슬러그 (slug) — URL</label>
            <input class="form-input" id="fSlug" type="text" placeholder="url-friendly-slug" />
            <div class="slug-hint" id="slugHint"></div>
          </div>
          <div class="form-group">
            <label class="form-label">카테고리</label>
            <select class="form-select" id="fCategory">
              <option value="접수 운영">접수 운영</option>
              <option value="현장 운영">현장 운영</option>
              <option value="친환경 운영">친환경 운영</option>
              <option value="플랫폼 활용">플랫폼 활용</option>
              <option value="Registration">Registration</option>
              <option value="On-Site Operations">On-Site Operations</option>
              <option value="Sustainability">Sustainability</option>
              <option value="Platform">Platform</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">태그 (쉼표 구분)</label>
            <input class="form-input" id="fTags" type="text" placeholder="태그1, 태그2, 태그3" />
          </div>
          <div class="form-group">
            <label class="form-label">게시일 (pubDate)</label>
            <input class="form-input" id="fDate" type="date" />
          </div>
          <div class="form-group">
            <label class="form-label">진행 상태</label>
            <select class="form-select" id="fStatus" onchange="onStatusChange()">
              <option value="draft">🔴 초안</option>
              <option value="writing">🟡 작성 중</option>
              <option value="published">🟢 배포 완료</option>
            </select>
          </div>
        </div>

        <!-- Image upload -->
        <div class="img-upload-row">
          <label class="img-upload-label" for="imgFileInput">
            🖼️ 이미지 업로드 (여러 장 가능)
          </label>
          <input type="file" id="imgFileInput" accept="image/*" multiple onchange="uploadImages(this)" />
          <span id="imgUploadStatus">여러 장 선택 가능 · 업로드 후 마크다운에 자동 삽입</span>
        </div>
        <div id="imgProgress" style="display:none;margin-bottom:12px;">
          <div style="font-size:12px;color:var(--muted);margin-bottom:6px;" id="imgProgressText"></div>
          <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden;">
            <div id="imgProgressBar" style="height:100%;background:linear-gradient(90deg,var(--purple),var(--cyan));width:0%;transition:width 0.3s;"></div>
          </div>
        </div>

        <!-- Editor toolbar -->
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
          <button class="btn btn-ghost btn-sm" onclick="openPreview()">👁️ 미리보기</button>
          <div class="autosave-bar">
            <div class="autosave-dot" id="autosaveDot"></div>
            <span id="autosaveLabel">임시저장 대기 중</span>
          </div>
        </div>

        <!-- Markdown editor -->
        <div class="editor-wrapper">
          <textarea id="mdEditor"></textarea>
        </div>

        <!-- Save bar -->
        <div class="save-bar">
          <span class="save-status" id="saveStatus"></span>
          <div style="display:flex;gap:8px;align-items:center;">
            <button class="btn btn-danger btn-sm" id="deleteBtn" onclick="deletePost()" style="display:none;">삭제</button>
            <button class="btn btn-ghost" onclick="showList()">취소</button>
            <button class="btn btn-primary" onclick="savePost()" id="saveBtn">저장 (발행)</button>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- ── PREVIEW MODAL ── -->
<div id="previewModal">
  <div class="preview-box">
    <div class="preview-box-header">
      <span>📄 미리보기</span>
      <button class="btn btn-ghost btn-sm" onclick="closePreview()">✕ 닫기</button>
    </div>
    <div class="preview-content" id="previewContent"></div>
  </div>
</div>

<script>
  // ── State ──
  let pw = '';
  let currentLang = 'ko';
  let currentSha = null;
  let currentPath = null;
  let easyMDE = null;
  let isNew = false;

  // ── Auth ──
  function doLogin() {
    pw = document.getElementById('pwInput').value;
    if (!pw) return;
    document.getElementById('loginErr').textContent = '';
    // Verify via API
    fetch(`/api/blog-admin?action=list&lang=ko&password=${encodeURIComponent(pw)}`)
      .then(r => {
        if (r.ok) {
          sessionStorage.setItem('blogAdminPw', pw);
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('app').style.display = 'block';
          initApp();
        } else {
          document.getElementById('loginErr').textContent = '비밀번호가 틀렸습니다.';
        }
      })
      .catch(() => { document.getElementById('loginErr').textContent = '서버 오류'; });
  }

  function doLogout() {
    sessionStorage.removeItem('blogAdminPw');
    location.reload();
  }

  document.getElementById('pwInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // Auto-login from session
  const savedPw = sessionStorage.getItem('blogAdminPw');
  if (savedPw) {
    pw = savedPw;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  }

  // ── Init ──
  function initApp() {
    initEditor();
    startAutosave();
    loadList();

    // status change handler already on select element

    document.getElementById('fSlug').addEventListener('input', function() {
      document.getElementById('slugHint').textContent = this.value
        ? `URL: /blog/${currentLang}/${this.value}/`
        : '';
    });
  }

  // ── Editor Init ──
  function initEditor() {
    if (easyMDE) return;
    easyMDE = new EasyMDE({
      element: document.getElementById('mdEditor'),
      spellChecker: false,
      autosave: { enabled: false },
      toolbar: [
        'bold', 'italic', 'heading', '|',
        'quote', 'unordered-list', 'ordered-list', '|',
        'link', 'image', '|',
        'table', 'horizontal-rule', '|',
        'preview', 'side-by-side', 'fullscreen', '|',
        'guide'
      ],
      placeholder: '마크다운으로 본문을 작성하세요...',
      minHeight: '380px',
    });
  }

  // ── List ──
  function switchLang(lang) {
    currentLang = lang;
    document.getElementById('tabKo').classList.toggle('active', lang === 'ko');
    document.getElementById('tabEn').classList.toggle('active', lang === 'en');
    loadList();
  }

  async function loadList() {
    const container = document.getElementById('postListContainer');
    container.innerHTML = '<div class="loading">불러오는 중...</div>';
    try {
      const r = await fetch(`/api/blog-admin?action=list&lang=${currentLang}&password=${encodeURIComponent(pw)}`);
      if (!r.ok) throw new Error('Failed');
      const { files } = await r.json();

      if (!files || files.length === 0) {
        container.innerHTML = '<div class="empty">포스트가 없습니다. 새 포스트를 작성해보세요.</div>';
        return;
      }

      // Read each file's frontmatter for title/draft info
      container.innerHTML = '';
      for (const f of files) {
        const item = document.createElement('div');
        item.className = 'post-item';
        item.innerHTML = `
          <div class="post-item-left">
            <div class="post-item-title">${f.slug}</div>
            <div class="post-item-meta">${f.path}</div>
          </div>
          <div class="post-item-actions">
            <button class="btn btn-ghost btn-sm" onclick="openEdit('${f.path}','${f.sha}')">편집</button>
          </div>`;
        container.appendChild(item);
      }

      // Enrich with frontmatter data async
      enrichList(files, container);

    } catch (e) {
      container.innerHTML = '<div class="empty">불러오기 실패. 새로고침 해주세요.</div>';
    }
  }

  async function enrichList(files, container) {
    for (const f of files) {
      try {
        const r = await fetch(`/api/blog-admin?action=read&path=${encodeURIComponent(f.path)}&password=${encodeURIComponent(pw)}`);
        if (!r.ok) continue;
        const { content } = await r.json();
        const fm = parseFrontmatter(content);
        const items = container.querySelectorAll('.post-item');
        for (const item of items) {
          if (item.querySelector('.post-item-meta')?.textContent === f.path) {
            const titleEl = item.querySelector('.post-item-title');
            if (fm.title) titleEl.textContent = fm.title;
            const meta = item.querySelector('.post-item-meta');
            const badge = statusBadgeHtml(fm.status || (fm.draft === 'true' || fm.draft === true ? 'draft' : 'published'));
            meta.innerHTML = `${badge} <span style="color:var(--muted2);font-size:11px;">${fm.pubDate || ''} · ${fm.category || ''}</span>`;
          }
        }
      } catch {}
    }
  }

  // ── Open ──
  function showList() {
    document.getElementById('listView').style.display = 'block';
    document.getElementById('editorPanel').classList.remove('open');
    loadList();
  }

  function openNew() {
    isNew = true;
    currentSha = null;
    currentPath = null;
    document.getElementById('editorTitle').textContent = '새 포스트';
    document.getElementById('editorLangBadge').textContent = currentLang === 'ko' ? '🇰🇷 한국어' : '🇺🇸 English';
    document.getElementById('fTitle').value = '';
    document.getElementById('fDesc').value = '';
    document.getElementById('fSlug').value = '';
    document.getElementById('fTags').value = '';
    document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('fStatus').value = 'draft';
    onStatusChange();
    document.getElementById('deleteBtn').style.display = 'none';
    document.getElementById('saveStatus').textContent = '';
    easyMDE.value('');
    document.getElementById('listView').style.display = 'none';
    document.getElementById('editorPanel').classList.add('open');
    // Restore draft if exists
    setTimeout(() => restoreDraft('new'), 100);
  }

  async function openEdit(path, sha) {
    isNew = false;
    currentSha = sha;
    currentPath = path;
    document.getElementById('saveStatus').textContent = '불러오는 중...';
    document.getElementById('listView').style.display = 'none';
    document.getElementById('editorPanel').classList.add('open');
    document.getElementById('deleteBtn').style.display = '';

    try {
      const r = await fetch(`/api/blog-admin?action=read&path=${encodeURIComponent(path)}&password=${encodeURIComponent(pw)}`);
      const { content, sha: latestSha } = await r.json();
      currentSha = latestSha;

      const fm = parseFrontmatter(content);
      const body = extractBody(content);

      document.getElementById('editorTitle').textContent = fm.title || path.split('/').pop();
      document.getElementById('editorLangBadge').textContent = currentLang === 'ko' ? '🇰🇷 한국어' : '🇺🇸 English';
      document.getElementById('fTitle').value = fm.title || '';
      document.getElementById('fDesc').value = fm.description || '';
      document.getElementById('fSlug').value = path.split('/').pop().replace('.md','');
      document.getElementById('fCategory').value = fm.category || '접수 운영';
      document.getElementById('fTags').value = (fm.tags || '').replace(/[\[\]"]/g, '');
      document.getElementById('fDate').value = fm.pubDate || new Date().toISOString().split('T')[0];
      document.getElementById('fStatus').value = fm.status || (fm.draft === 'false' ? 'published' : 'draft');
      onStatusChange();
      easyMDE.value(body);
      document.getElementById('saveStatus').textContent = '';
    } catch (e) {
      document.getElementById('saveStatus').className = 'save-status err';
      document.getElementById('saveStatus').textContent = '불러오기 실패';
    }
  }

  // ── Save ──
  async function savePost() {
    const title = document.getElementById('fTitle').value.trim();
    const desc = document.getElementById('fDesc').value.trim();
    const slug = document.getElementById('fSlug').value.trim().replace(/\s+/g, '-').toLowerCase();
    const category = document.getElementById('fCategory').value;
    const tags = document.getElementById('fTags').value.split(',').map(t => t.trim()).filter(Boolean);
    const date = document.getElementById('fDate').value;
    const status = document.getElementById('fStatus').value;
    // Auto-promote: draft → writing on first save
    const finalStatus = (status === 'draft' && !isNew) ? 'writing' : status;
    if (finalStatus !== status) document.getElementById('fStatus').value = finalStatus;
    const draft = finalStatus !== 'published';
    const body = easyMDE.value();

    if (!title || !slug) {
      document.getElementById('saveStatus').className = 'save-status err';
      document.getElementById('saveStatus').textContent = '제목과 슬러그는 필수입니다.';
      return;
    }

    const tagsYaml = tags.length ? `tags: [${tags.map(t => `"${t}"`).join(', ')}]` : 'tags: []';
    const content = `---
title: "${title.replace(/"/g, '\\"')}"
description: "${desc.replace(/"/g, '\\"')}"
pubDate: ${date}
category: "${category}"
${tagsYaml}
author: "FAIRPASS ${currentLang === 'ko' ? '팀' : 'Team'}"
draft: ${draft}
status: ${finalStatus}
---

${body}`;

    const path = currentPath || `blog-src/src/content/blog-${currentLang}/${slug}.md`;

    document.getElementById('saveBtn').disabled = true;
    document.getElementById('saveStatus').className = 'save-status';
    document.getElementById('saveStatus').textContent = '저장 중...';

    try {
      const r = await fetch('/api/blog-admin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'save',
          path,
          content,
          sha: currentSha || undefined,
          password: pw,
        }),
      });
      const data = await r.json();
      if (r.ok) {
        currentSha = data.sha;
        currentPath = path;
        isNew = false;
        document.getElementById('deleteBtn').style.display = '';
        document.getElementById('saveStatus').className = 'save-status ok';
        document.getElementById('saveStatus').textContent = '✓ 저장 완료 — Vercel이 자동 빌드합니다';
        clearDraft();
      } else {
        throw new Error(data.error || 'Save failed');
      }
    } catch (e) {
      document.getElementById('saveStatus').className = 'save-status err';
      document.getElementById('saveStatus').textContent = `저장 실패: ${e.message}`;
    } finally {
      document.getElementById('saveBtn').disabled = false;
    }
  }

  // ── Delete ──
  async function deletePost() {
    if (!currentPath || !currentSha) return;
    const slug = currentPath.split('/').pop();
    if (!confirm(`"${slug}" 포스트를 삭제하시겠습니까? 되돌릴 수 없습니다.`)) return;

    document.getElementById('saveStatus').className = 'save-status';
    document.getElementById('saveStatus').textContent = '삭제 중...';

    try {
      const r = await fetch('/api/blog-admin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'delete', path: currentPath, sha: currentSha, password: pw }),
      });
      if (r.ok) {
        showList();
      } else {
        const d = await r.json();
        throw new Error(d.error);
      }
    } catch (e) {
      document.getElementById('saveStatus').className = 'save-status err';
      document.getElementById('saveStatus').textContent = `삭제 실패: ${e.message}`;
    }
  }

  // ── Image upload (multiple) ──
  async function uploadImages(input) {
    const files = Array.from(input.files);
    if (!files.length) return;

    const statusEl = document.getElementById('imgUploadStatus');
    const progressEl = document.getElementById('imgProgress');
    const progressText = document.getElementById('imgProgressText');
    const progressBar = document.getElementById('imgProgressBar');

    progressEl.style.display = 'block';
    statusEl.textContent = '';
    let done = 0;

    const readAsBase64 = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    const results = [];
    for (const file of files) {
      progressText.textContent = `업로드 중 ${done + 1} / ${files.length} — ${file.name}`;
      progressBar.style.width = `${(done / files.length) * 100}%`;
      try {
        const base64 = await readAsBase64(file);
        const filename = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.\-_]/g, '_')}`;
        const r = await fetch('/api/blog-admin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'upload', filename, base64, mime: file.type, password: pw }),
        });
        const data = await r.json();
        if (r.ok) {
          results.push({ name: file.name, url: data.url, ok: true });
        } else {
          results.push({ name: file.name, error: data.error, ok: false });
        }
      } catch (err) {
        results.push({ name: file.name, error: err.message, ok: false });
      }
      done++;
    }

    // Insert all successful images into editor
    const mdImages = results.filter(r => r.ok).map(r => `![${r.name}](${r.url})`).join('\n');
    if (mdImages) {
      easyMDE.value(easyMDE.value() + '\n\n' + mdImages);
    }

    progressBar.style.width = '100%';
    const okCount = results.filter(r => r.ok).length;
    const failCount = results.filter(r => !r.ok).length;
    progressText.textContent = `완료: ${okCount}개 성공${failCount ? ` / ${failCount}개 실패` : ''} (빌드 후 사이트에 표시됩니다)`;
    statusEl.style.color = failCount ? 'var(--red)' : 'var(--green)';

    setTimeout(() => { progressEl.style.display = 'none'; }, 5000);
    input.value = '';
  }

  // ── Status helpers ──
  function onStatusChange() {
    const status = document.getElementById('fStatus').value;
    const saveBtn = document.getElementById('saveBtn');
    if (status === 'published') {
      saveBtn.textContent = '저장 (배포)';
      saveBtn.style.background = 'linear-gradient(135deg,#10b981,#06b6d4)';
    } else if (status === 'writing') {
      saveBtn.textContent = '저장 (작성 중)';
      saveBtn.style.background = '';
    } else {
      saveBtn.textContent = '저장 (초안)';
      saveBtn.style.background = '';
    }
  }

  function statusBadgeHtml(status) {
    const map = {
      draft:     '<span class="badge badge-draft">초안</span>',
      writing:   '<span class="badge badge-writing">작성 중</span>',
      published: '<span class="badge badge-pub">배포 완료</span>',
    };
    return map[status] || map.draft;
  }

  // ── Preview ──
  function openPreview() {
    const title = document.getElementById('fTitle').value || '(제목 없음)';
    const body = easyMDE.value();
    const html = marked.parse(body);
    document.getElementById('previewContent').innerHTML =
      `<h1>${title}</h1><hr style="margin:16px 0 24px;border-color:rgba(255,255,255,0.1);">` + html;
    document.getElementById('previewModal').classList.add('open');
  }

  function closePreview() {
    document.getElementById('previewModal').classList.remove('open');
  }

  document.getElementById('previewModal').addEventListener('click', function(e) {
    if (e.target === this) closePreview();
  });

  // ── Autosave (localStorage) ──
  const DRAFT_KEY = () => `fp-blog-draft-${currentLang}-${document.getElementById('fSlug').value || 'new'}`;

  function autosaveState() {
    return {
      title: document.getElementById('fTitle').value,
      desc: document.getElementById('fDesc').value,
      slug: document.getElementById('fSlug').value,
      category: document.getElementById('fCategory').value,
      tags: document.getElementById('fTags').value,
      date: document.getElementById('fDate').value,
      draft: document.getElementById('fDraft').checked,
      body: easyMDE ? easyMDE.value() : '',
      lang: currentLang,
      path: currentPath,
      sha: currentSha,
      savedAt: new Date().toISOString(),
    };
  }

  function doAutosave() {
    if (!easyMDE) return;
    const dot = document.getElementById('autosaveDot');
    const label = document.getElementById('autosaveLabel');
    dot.className = 'autosave-dot saving';
    label.textContent = '임시저장 중...';
    try {
      localStorage.setItem(DRAFT_KEY(), JSON.stringify(autosaveState()));
      dot.className = 'autosave-dot saved';
      const t = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
      label.textContent = `임시저장 완료 ${t}`;
    } catch {
      dot.className = 'autosave-dot';
      label.textContent = '임시저장 실패';
    }
  }

  function restoreDraft(slug) {
    const key = `fp-blog-draft-${currentLang}-${slug || 'new'}`;
    const raw = localStorage.getItem(key);
    if (!raw) return false;
    try {
      const d = JSON.parse(raw);
      const savedAt = new Date(d.savedAt).toLocaleString('ko-KR');
      if (!confirm(`임시저장된 내용이 있습니다 (${savedAt}).\n불러올까요?`)) return false;
      document.getElementById('fTitle').value = d.title || '';
      document.getElementById('fDesc').value = d.desc || '';
      document.getElementById('fSlug').value = d.slug || '';
      document.getElementById('fCategory').value = d.category || '접수 운영';
      document.getElementById('fTags').value = d.tags || '';
      document.getElementById('fDate').value = d.date || '';
      document.getElementById('fDraft').checked = d.draft ?? true;
      easyMDE.value(d.body || '');
      if (d.path) currentPath = d.path;
      if (d.sha) currentSha = d.sha;
      return true;
    } catch { return false; }
  }

  function clearDraft() {
    try { localStorage.removeItem(DRAFT_KEY()); } catch {}
  }

  // Start autosave timer after editor init
  let autosaveTimer = null;
  function startAutosave() {
    if (autosaveTimer) clearInterval(autosaveTimer);
    autosaveTimer = setInterval(doAutosave, 30000); // every 30s
    if (easyMDE) {
      easyMDE.codemirror.on('change', () => {
        clearTimeout(window._asDebounce);
        window._asDebounce = setTimeout(doAutosave, 5000); // 5s after stop typing
      });
    }
  }

  // ── Frontmatter helpers ──
  function parseFrontmatter(content) {
    const match = content.match(/^---\n([\s\S]*?)\n---/);
    if (!match) return {};
    const result = {};
    const lines = match[1].split('\n');
    for (const line of lines) {
      const colonIdx = line.indexOf(':');
      if (colonIdx === -1) continue;
      const key = line.slice(0, colonIdx).trim();
      const val = line.slice(colonIdx + 1).trim().replace(/^["']|["']$/g, '');
      result[key] = val;
    }
    return result;
  }

  function extractBody(content) {
    const match = content.match(/^---\n[\s\S]*?\n---\n+([\s\S]*)$/);
    return match ? match[1].trim() : content;
  }
</script>
